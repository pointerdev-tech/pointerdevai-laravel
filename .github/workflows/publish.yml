# Packagist auto-syncs from GitHub on repository/tag updates.
# This workflow intentionally avoids webhook calls so missing secrets do not fail release CI.
name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No-op
        run: echo "Packagist sync is handled via GitHub integration."
